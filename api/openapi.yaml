openapi: 3.0.3

info:
  title: Farado API
  description: Спецификация API для системы управления проектами Farado, задачами, рабочими процессами и правами доступа.
  version: 1.0.0

servers:
  - url: https://farado.lan/api/v1
    description: Production server
  - url: http://localhost:8080/api/v1
    description: Development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # =====================================================
    # 1. ПОЛЬЗОВАТЕЛИ И КОМАНДЫ (Users and Teams)
    # =====================================================
    User:
      type: object
      required: [login]
      properties:
        id: { type: integer, description: Уникальный идентификатор пользователя }
        login: { type: string, description: Логин пользователя (уникальный) }
        firstName: { type: string, description: Имя пользователя }
        middleName: { type: string, description: Отчество пользователя }
        lastName: { type: string, description: Фамилия пользователя }
        email: { type: string, description: Email пользователя (уникальный) }
        password: { type: string, description: Пароль, writeOnly: true }
        needChangePassword: { type: boolean, description: Флаг необходимости смены пароля при следующем входе }
        isBlocked: { type: boolean, description: Флаг блокировки пользователя (запрет входа) }
        isSuperAdmin: { type: boolean, description: Флаг супер-администратора (имеет все права) }
        isHidden: { type: boolean, description: Флаг скрытого пользователя (не отображается в списках) }
    Team:
      type: object
      required: [caption]
      properties:
        id: { type: integer, description: Уникальный идентификатор команды }
        caption: { type: string, description: Название команды }
        description: { type: string, description: Описание команды }
    Role:
      type: object
      required: [caption]
      properties:
        id: { type: integer, description: Уникальный идентификатор роли }
        caption: { type: string, description: Название роли }
        description: { type: string, description: Описание роли }
    Rule:
      type: object
      required: [roleId]
      properties:
        id: { type: integer, description: Уникальный идентификатор правила }
        roleId: { type: integer, description: Идентификатор роли }
        isRootProjectCreator: { type: boolean, description: Право на создание корневых проектов }
    RuleProject:
      type: object
      required: [ruleId, projectId]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        ruleId: { type: integer, description: Идентификатор правила }
        projectId: { type: integer, description: Идентификатор проекта }
        isReader: { type: boolean, description: Право на просмотр элементов (items) проекта }
        isWriter: { type: boolean, description: Право на создание и изменение элементов (items) проекта }
        isProjectEditor: { type: boolean, description: Право на создание и изменение подпроектов }
        isPhaseEditor: { type: boolean, description: Право на создание и изменение фаз }
        isBoardEditor: { type: boolean, description: Право на создание и изменение досок }
    RuleItemType:
      type: object
      required: [ruleId, itemTypeId]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        ruleId: { type: integer, description: Идентификатор правила }
        itemTypeId: { type: integer, description: Идентификатор типа элемента }
        isReader: { type: boolean, description: Право на чтение элементов данного типа }
        isWriter: { type: boolean, description: Право на создание и изменение элементов данного типа }
    RuleState:
      type: object
      required: [ruleId, stateId]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        ruleId: { type: integer, description: Идентификатор правила }
        stateId: { type: integer, description: Идентификатор целевого состояния }
        isStateAllowed: { type: boolean, description: Разрешение на перевод элемента в это состояние }
    UserTeamRole:
      type: object
      required: [userId, teamId, roleId]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        userId: { type: integer, description: Идентификатор пользователя }
        teamId: { type: integer, description: Идентификатор команды }
        roleId: { type: integer, description: Идентификатор роли }

    # =====================================================
    # 2. ПРОЕКТЫ И ФАЗЫ (Projects and Phases)
    # =====================================================
    Project:
      type: object
      required: [caption]
      properties:
        id: { type: integer, description: Уникальный идентификатор проекта }
        parentId: { type: integer, nullable: true, description: Идентификатор родительского проекта (null для корневых) }
        caption: { type: string, description: Название проекта }
        description: { type: string, description: Описание проекта }
        createdAt: { type: string, format: date-time, description: Дата и время создания }
        updatedAt: { type: string, format: date-time, description: Дата и время последнего обновления }
        isArchive: { type: boolean, description: Флаг архивации (мягкое удаление) }
    Phase:
      type: object
      required: [projectId, caption]
      properties:
        id: { type: integer, description: Уникальный идентификатор фазы }
        projectId: { type: integer, description: Идентификатор проекта }
        caption: { type: string, description: Название фазы }
        description: { type: string, description: Описание фазы }
        beginDate: { type: string, format: date-time, description: Дата начала фазы }
        endDate: { type: string, format: date-time, description: Дата окончания фазы }
        isArchive: { type: boolean, description: Флаг архивации фазы }
    ProjectTeam:
      type: object
      required: [projectId, teamId]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        projectId: { type: integer, description: Идентификатор проекта }
        teamId: { type: integer, description: Идентификатор команды }

    # =====================================================
    # 3. РАБОЧИЕ ПРОЦЕССЫ (Workflows)
    # =====================================================
    Workflow:
      type: object
      required: [caption]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        caption: { type: string, description: Название рабочего процесса }
        description: { type: string, description: Описание рабочего процесса }
    State:
      type: object
      required: [workflowId, caption]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        workflowId: { type: integer, description: Идентификатор рабочего процесса }
        caption: { type: string, description: Название состояния }
        description: { type: string, description: Описание состояния }
        weight: { type: integer, description: Вес состояния (для метрик) }
        orderNumber: { type: integer, description: Порядковый номер для сортировки }
        isArchive: { type: boolean, description: Флаг архивного состояния (редко отображается) }
        isQueue: { type: boolean, description: Флаг очереди (для определения активных работ) }
    Edge:
      type: object
      required: [beginStateId, endStateId]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        beginStateId: { type: integer, description: Начальное состояние }
        endStateId: { type: integer, description: Конечное состояние }

    # =====================================================
    # 4. ТИПЫ ЭЛЕМЕНТОВ И ПОЛЯ (Item Types and Fields)
    # =====================================================
    ItemType:
      type: object
      required: [workflowId, defaultStateId, caption, kind]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        workflowId: { type: integer, description: Идентификатор рабочего процесса }
        defaultStateId: { type: integer, description: Состояние по умолчанию для новых элементов }
        caption: { type: string, description: Название типа }
        kind: { type: string, enum: [issue, folder, test-case, test-cycle, test-run, requirement], description: Вид элемента }
        defaultContent: { type: string, description: Содержимое по умолчанию (шаблон для создания новых item) }
    FieldType:
      type: object
      required: [itemTypeId, caption, valueType]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        itemTypeId: { type: integer, description: Идентификатор типа элемента }
        caption: { type: string, description: Название поля }
        description: { type: string, description: Описание поля }
        valueType: { type: string, enum: [String, MarkdownText, Integer, Float, Bool, DateTime, Date, Uri, Select, SelectMulti, ItemId, UserId, ProjectId, PhaseId, ItemsIds, UsersIds, ProjectsIds, PhasesIds], description: Тип значения }
        isBoardVisible: { type: boolean, description: Отображать поле на канбан-доске }
    FieldTypePossibleValue:
      type: object
      required: [fieldTypeId, value]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        fieldTypeId: { type: integer, description: Идентификатор типа поля }
        value: { type: string, description: Значение для выбора }

    # =====================================================
    # 5. ЭЛЕМЕНТЫ (Items)
    # =====================================================
    Item:
      type: object
      required: [itemTypeId, stateId, phaseId, caption]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        itemTypeId: { type: integer, description: Идентификатор типа элемента }
        parentId: { type: integer, nullable: true, description: Идентификатор родительского элемента }
        stateId: { type: integer, description: Идентификатор текущего состояния }
        phaseId: { type: integer, description: Идентификатор фазы }
        caption: { type: string, description: Название элемента }
        content: { type: string, description: Содержимое элемента }
        isDeleted: { type: boolean, description: Флаг удаления (мягкое удаление) }
    ItemField:
      type: object
      required: [itemId, fieldTypeId]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        itemId: { type: integer, description: Идентификатор элемента }
        fieldTypeId: { type: integer, description: Идентификатор типа поля }
        value: { type: string, description: Значение поля (в сериализованном виде) }
    ItemHistory:
      type: object
      required: [itemId, userId, timestamp]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        itemId: { type: integer, description: Идентификатор элемента }
        userId: { type: integer, description: Идентификатор пользователя, внесшего изменение }
        timestamp: { type: string, format: date-time, description: Время изменения }
        diff: { type: string, description: JSON с изменениями (diff) }
    ItemUserState:
      type: object
      required: [itemId, userId, stateId, timestamp]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        itemId: { type: integer, description: Идентификатор элемента }
        userId: { type: integer, description: Идентификатор пользователя }
        stateId: { type: integer, description: Идентификатор состояния }
        comment: { type: string, description: Комментарий к переходу }
        timestamp: { type: string, format: date-time, description: Время перехода }

    # =====================================================
    # 6. СВЯЗИ (Links)
    # =====================================================
    LinkType:
      type: object
      required: [sourceItemTypeId, destinationItemTypeId, isBidirectional, caption]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        sourceItemTypeId: { type: integer, description: Исходный тип элемента }
        destinationItemTypeId: { type: integer, description: Целевой тип элемента }
        isBidirectional: { type: boolean, description: Флаг двунаправленной связи }
        caption: { type: string, description: Название типа связи }
    ItemLink:
      type: object
      required: [linkTypeId, sourceItemId, destinationItemId]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        linkTypeId: { type: integer, description: Идентификатор типа связи }
        sourceItemId: { type: integer, description: Исходный элемент }
        destinationItemId: { type: integer, description: Целевой элемент }

    # =====================================================
    # 7. ДОКУМЕНТЫ И КОММЕНТАРИИ (Documents and Comments)
    # =====================================================
    Document:
      type: object
      required: [caption]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        caption: { type: string, description: Название документа }
        description: { type: string, description: Описание документа }
        path: { type: string, description: Путь к файлу на диске }
        filename: { type: string, description: Исходное имя файла }
        size: { type: integer, description: Размер файла в байтах }
        mimeType: { type: string, description: MIME-тип файла }
        uploadedAt: { type: string, format: date-time, description: Время загрузки }
        uploadedByUserId: { type: integer, description: Идентификатор пользователя, загрузившего файл }
    ItemDocument:
      required: [itemId, documentId]
      type: object
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        itemId: { type: integer, description: Идентификатор элемента }
        documentId: { type: integer, description: Идентификатор документа }
    Comment:
      type: object
      required: [userId, itemId, content]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        userId: { type: integer, description: Идентификатор автора }
        itemId: { type: integer, description: Идентификатор элемента }
        createdAt: { type: string, format: date-time, description: Время создания }
        content: { type: string, description: Текст комментария }
    CommentDocument:
      type: object
      required: [commentId, documentId]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        commentId: { type: integer, description: Идентификатор комментария }
        documentId: { type: integer, description: Идентификатор документа }

    # =====================================================
    # 8. ДОСКИ (Kanban Boards)
    # =====================================================
    Board:
      type: object
      required: [workflowId, caption]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        workflowId: { type: integer, description: Идентификатор рабочего процесса }
        projectId: { type: integer, description: Идентификатор проекта }
        phaseId: { type: integer, nullable: true, description: Идентификатор фазы }
        caption: { type: string, description: Название доски }
        description: { type: string, description: Описание доски }
    BoardColumn:
      type: object
      required: [boardId, stateId, orderNumber]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        boardId: { type: integer, description: Идентификатор доски }
        stateId: { type: integer, description: Идентификатор состояния }
        orderNumber: { type: integer, description: Порядковый номер колонки на доске }
        settings: { type: string, description: JSON с настройками (WIP limit, цвет и т.д.) }

    # =====================================================
    # 9. КАЛЕНДАРЬ И РАБОЧЕЕ ВРЕМЯ (Calendar and Working Time)
    # =====================================================
    StandardDay:
      type: object
      required: [weekDayNumber, weekOrder, isWorkDay]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        weekDayNumber: { type: integer, minimum: 0, maximum: 6, description: Номер дня недели (0-6) }
        weekOrder: { type: integer, description: Порядковый номер недели (для сменного графика) }
        isWorkDay: { type: boolean, description: Является ли день рабочим }
        beginWorkTime: { type: string, pattern: "^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$", description: Время начала работы (HH:MM) }
        endWorkTime: { type: string, pattern: "^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$", description: Время окончания работы (HH:MM) }
        breakDuration: { type: integer, description: Длительность перерыва в минутах }
    SpecialDay:
      type: object
      required: [date]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        date: { type: string, format: date, description: Дата (уникальная) }
        isWorkDay: { type: boolean, description: Является ли день рабочим }
        beginWorkTime: { type: string, pattern: "^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$", description: Время начала работы (если рабочий) }
        endWorkTime: { type: string, pattern: "^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$", description: Время окончания работы (если рабочий) }
        breakDuration: { type: integer, description: Длительность перерыва в минутах }
    UserDay:
      type: object
      required: [userId, date]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        userId: { type: integer, description: Идентификатор пользователя }
        date: { type: string, format: date, description: Дата (уникальна в паре с userId) }
        isWorkDay: { type: boolean, description: Является ли день рабочим для пользователя }
        beginWorkTime: { type: string, pattern: "^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$", description: Время начала работы (если рабочий) }
        endWorkTime: { type: string, pattern: "^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$", description: Время окончания работы (если рабочий) }
        breakDuration: { type: integer, description: Длительность перерыва в минутах }
        description: { type: string, description: Причина (отпуск, больничный и т.д.) }

    # =====================================================
    # 10. СООБЩЕНИЯ И УВЕДОМЛЕНИЯ (Messages and Notifications)
    # =====================================================
    PrivateMessage:
      type: object
      required: [senderUserId, receiverUserId, creationTimestamp, content]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        senderUserId: { type: integer, description: Идентификатор отправителя }
        receiverUserId: { type: integer, description: Идентификатор получателя }
        creationTimestamp: { type: string, format: date-time, description: Время отправки }
        content: { type: string, description: Текст сообщения }
        isViewed: { type: boolean, description: Флаг прочтения }
    TeamMessage:
      type: object
      required: [senderUserId, teamId, creationTimestamp, content]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        senderUserId: { type: integer, description: Идентификатор отправителя }
        teamId: { type: integer, description: Идентификатор команды }
        creationTimestamp: { type: string, format: date-time, description: Время отправки }
        content: { type: string, description: Текст сообщения }
    UserNotification:
      type: object
      required: [userId, itemId]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        userId: { type: integer, description: Идентификатор пользователя }
        itemId: { type: integer, description: Идентификатор элемента }

    # =====================================================
    # 11. ДЕЙСТВИЯ И ЗАДАЧИ (Actions and Tasks)
    # =====================================================
    UserAction:
      type: object
      required: [userId, timestamp, caption]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        userId: { type: integer, description: Идентификатор пользователя }
        timestamp: { type: string, format: date-time, description: Время действия }
        caption: { type: string, description: Краткое описание действия }
        description: { type: string, description: Подробное описание (контекст) }
    UserTodo:
      type: object
      required: [userId, isDone, caption]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        userId: { type: integer, description: Идентификатор пользователя }
        isDone: { type: boolean, description: Флаг выполнения }
        caption: { type: string, description: Текст задачи }
      ItemPlanning:
      type: object
      required: [itemId, userId, startDate, endDate]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        itemId: { type: integer, description: Идентификатор элемента }
        userId: { type: integer, description: Идентификатор пользователя }
        startDate: { type: string, format: date-time, description: Плановая дата начала }
        endDate: { type: string, format: date-time, description: Плановая дата окончания }

    # =====================================================
    # 12. СПРАВОЧНИКИ (Directories)
    # =====================================================
    RoleMenuItem:
      type: object
      required: [roleId, caption, link]
      properties:
        id: { type: integer, description: Уникальный идентификатор }
        roleId: { type: integer, description: Идентификатор роли }
        caption: { type: string, description: Название пункта меню }
        link: { type: string, description: Ссылка (URL) }
        icon: { type: string, description: Значок пункта меню }

    # =====================================================
    # ОБЩИЕ КОМПОНЕНТЫ (Common Components)
    # =====================================================
    ErrorResponse:
      type: object
      required: [code]
      properties:
        code: { type: integer, description: Код ошибки HTTP }
        message: { type: string, description: Сообщение об ошибке }
        details: { type: string, description: Дополнительные детали ошибки }
    PageResponse:
      type: object
      properties:
        items: { type: array, items: {} }
        totalCount: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }
    AuthRequest:
      type: object
      required: [login, password]
      properties:
        login: { type: string }
        password: { type: string }
    AuthResponse:
      type: object
      properties:
        accessToken: { type: string }
        tokenType: { type: string, default: Bearer }
    ChangePasswordRequest:
      type: object
      required: [oldPassword, newPassword]
      properties:
        oldPassword: { type: string }
        newPassword: { type: string }

security:
  - bearerAuth: []

paths:
  # =====================================================
  # АУТЕНТИФИКАЦИЯ
  # =====================================================
  /auth/login:
    post:
      tags: [Authentication]
      summary: Вход в систему
      description: Аутентификация пользователя по логину и паролю
      requestBody:
        required: true
